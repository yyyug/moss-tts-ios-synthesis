name: MOSSTTS
options:
  bundleIdPrefix: com.openmoss.mosstts
  deploymentTarget:
    iOS: 17.0
  generateEmptyDirectories: true

packages:
  MLX:
    url: https://github.com/ml-explore/mlx-swift
    branch: main
  MLXAudio:
    url: https://github.com/Blaizzy/mlx-audio-swift
    branch: main

targets:
  MOSS-TTS-Host:
    type: application
    platform: iOS
    sources: [MOSS-TTS-Host]
    dependencies:
      - target: MOSS-TTS-Extension
    settings:
      base:
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.openmoss.mosstts.host
        INFOPLIST_FILE: MOSS-TTS-Host/Info.plist

  MOSS-TTS-Extension:
    type: app-extension
    platform: iOS
    sources: [MOSS-TTS-Extension]
    dependencies:
      - package: MLX
      - package: MLXAudio
    settings:
      base:
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.openmoss.mosstts.extension
        INFOPLIST_FILE: MOSS-TTS-Extension/Info.plist