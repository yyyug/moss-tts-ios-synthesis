name: MOSSTTS
options:
  bundleIdPrefix: com.openmoss.mosstts
  deploymentTarget:
    iOS: 17.0
  generateEmptyDirectories: true

packages:
  MLXAudio:
    url: https://github.com/Blaizzy/mlx-audio-swift
    branch: main

targets:
  MOSS-TTS-Host:
    type: application
    platform: iOS
    sources: [MOSS-TTS-Host]
    dependencies:
      - target: MOSS-TTS-Extension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openmoss.mosstts.host
        INFOPLIST_FILE: MOSS-TTS-Host/Info.plist
    entitlements:
      path: MOSS-TTS-Host/MOSS-TTS-Host.entitlements

  MOSS-TTS-Extension:
    type: app-extension
    platform: iOS
    sources: [MOSS-TTS-Extension]
    dependencies:
      - package: MLXAudio
        product: MLXAudioTTS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openmoss.mosstts.host.extension
        INFOPLIST_FILE: MOSS-TTS-Extension/Info.plist
    entitlements:
      path: MOSS-TTS-Extension/MOSS-TTS-Extension.entitlements
